name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            exit 1
          fi

      - name: Generate docs
        run: npm run gen:docs

      - name: Verify docs/assertions.md is up to date
        run: |
          if ! git diff --exit-code -- docs/assertions.md; then
            echo "::error::docs/assertions.md is out of date. Run 'npm run gen:docs' and commit the result."
            exit 1
          fi
