name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22 # LTS
          - 24 # LTS
          - 26 # current
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ strategy.matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Verify dist/ is up to date
        run: |
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is out of date. Run 'pnpm run build' and commit the result."
            exit 1
          fi

      - name: Generate docs
        run: pnpm run gen:docs

      - name: Verify docs/assertions.md is up to date
        run: |
          if ! git diff --exit-code -- docs/assertions.md; then
            echo "::error::docs/assertions.md is out of date. Run 'npm run gen:docs' and commit the result."
            exit 1
          fi
